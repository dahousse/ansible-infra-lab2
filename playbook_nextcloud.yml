---
- name: Installation et configuration de Nextcloud
  hosts: nextcloud_host
  become: yes
  vars:
    nextcloud_version: "30.0.0"
    nextcloud_url: "https://download.nextcloud.com/server/releases/nextcloud-{{ nextcloud_version }}.tar.bz2"
    domain: "cloud.mysmihome.duckdns.org"
    data_dir: "/var/www/nextcloud/data"
    db_name: "nextcloud"
    db_user: "nextcloud"
    nextcloud_admin_user: "admin"

  tasks:
    - name: Installer les dépendances
      apt:
        name:
          - nginx
          - mariadb-server
          - php
          - php-cli
          - php-fpm
          - php-mysql
          - php-gd
          - php-curl
          - php-zip
          - php-xml
          - php-mbstring
          - php-intl
          - php-bcmath
          - php-gmp
          - unzip
          - wget
          - bzip2
          - rsync
        state: present
        update_cache: yes

    - name: Installer le module Python MySQL
      apt:
        name: python3-pymysql
        state: present

    - name: Créer la base de données Nextcloud
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Créer l'utilisateur de la base de données
      mysql_user:
        name: "{{ db_user }}"
        password: "{{ nextcloud_db_password }}"
        priv: "nextcloud.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      no_log: true

    - name: Télécharger Nextcloud
      get_url:
        url: "{{ nextcloud_url }}"
        dest: "/tmp/nextcloud.tar.bz2"
        mode: "0644"

    - name: Extraire Nextcloud
      unarchive:
        src: "/tmp/nextcloud.tar.bz2"
        dest: /var/www/
        remote_src: yes
        creates: /var/www/nextcloud/index.php

    - name: Créer le répertoire de données
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0750"

    - name: Configurer les permissions
      file:
        path: /var/www/nextcloud
        owner: www-data
        group: www-data
        recurse: yes

    - name: Détecter la version PHP installée
      command: php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;'
      register: php_version
      changed_when: false

    - name: Configurer Nginx
      copy:
        dest: /etc/nginx/sites-available/nextcloud
        content: |
          server {
              listen 80;
              server_name {{ domain }};
              client_max_body_size 1024M;

              root /var/www/nextcloud;

              index index.php index.html;

              location / {
                  try_files $uri $uri/ /index.php$request_uri;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version.stdout }}-fpm.sock;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
                  fastcgi_read_timeout 360;
              }

              location ~* \.(?:css|js|woff2?|svg|gif|png|jpg|ico)$ {
                  expires 6M;
                  access_log off;
              }
          }
      notify: restart nginx

    - name: Activer le site
      file:
        src: /etc/nginx/sites-available/nextcloud
        dest: /etc/nginx/sites-enabled/nextcloud
        state: link
      notify: restart nginx

    - name: Supprimer le site par défaut
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Installer Nextcloud si nécessaire
      command: >
        sudo -u www-data php occ maintenance:install
        --database mysql
        --database-name {{ db_name }}
        --database-user {{ db_user }}
        --database-pass {{ nextcloud_db_password }}
        --admin-user {{ nextcloud_admin_user }}
        --admin-pass {{ nextcloud_admin_password }}
      args:
        chdir: /var/www/nextcloud
        creates: /var/www/nextcloud/config/config.php
      no_log: true

    - name: Configurer les domaines fiables
      command: "sudo -u www-data php occ config:system:set trusted_domains {{ item.index }} --value={{ item.value }}"
      args:
        chdir: /var/www/nextcloud
      loop:
        - { index: 0, value: "{{ domain }}" }
        - { index: 1, value: "{{ ansible_host }}" }

    - name: Configurer le proxy inverse
      command: "sudo -u www-data php occ config:system:set {{ item.key }} --value={{ item.value }}"
      args:
        chdir: /var/www/nextcloud
      loop:
        - { key: overwrite.cli.url, value: "https://{{ domain }}" }
        - { key: overwriteprotocol, value: https }
        - { key: overwritehost, value: "{{ domain }}" }
        - { key: trusted_proxies.0, value: "192.168.1.200" }

    - name: Configurer le cron Nextcloud
      cron:
        name: Nextcloud background jobs
        user: www-data
        job: "php -f /var/www/nextcloud/cron.php"
        minute: "*/5"

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
