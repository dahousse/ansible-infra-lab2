---
- name: Installation et configuration de Grafana
  hosts: grafana
  become: true

  tasks:
    - name: Mettre à jour le cache APT
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer les dépendances et le dépôt Grafana
      block:
        - name: Installer dépendances
          apt:
            name:
              - apt-transport-https
              - software-properties-common
              - wget
              - gnupg
            state: present

        - name: Ajouter la clé GPG Grafana
          apt_key:
            url: https://packages.grafana.com/gpg.key
            state: present

        - name: Ajouter le dépôt Grafana
          apt_repository:
            repo: "deb https://packages.grafana.com/oss/deb stable main"
            state: present
            filename: grafana

        - name: Mettre à jour le cache après ajout du dépôt
          apt:
            update_cache: yes

      rescue:
        - name: Gérer les erreurs de dépôt
          debug:
            msg: "Erreur lors de l'ajout du dépôt Grafana, vérifiez la connexion."

    - name: Installer Grafana
      apt:
        name: grafana
        state: present

    - name: Configurer le port Grafana
      lineinfile:
        path: /etc/grafana/grafana.ini
        regexp: '^;?http_port'
        line: 'http_port = {{ grafana_port }}'
      notify: restart grafana

    - name: Configurer la source de données Prometheus
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: {{ prometheus_url }}
              isDefault: true
              editable: true

    - name: Activer et démarrer Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started

  handlers:
    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarte
