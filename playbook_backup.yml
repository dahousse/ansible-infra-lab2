---
- name: Sauvegarde Automatisée de Proxmox (mode API)
  hosts: proxmox_host
  gather_facts: no
  vars:
    backup_storage: "local"
    backup_mode: "snapshot"
    backup_targets: "101 105 106 107 108 109 110 111 113 114 116 118 119 120 121 122"

  tasks:
    - name: Vérifier que le stockage de sauvegarde existe
      shell: "pvesh get /storage/{{ backup_storage }}"
      register: storage_check
      ignore_errors: yes

    - name: Afficher une erreur si le stockage est introuvable
      fail:
        msg: "Le stockage '{{ backup_storage }}' n'existe pas sur Proxmox."
      when: storage_check.rc != 0

    - name: Lancer la sauvegarde via l'API Proxmox
      shell: >
        pvesh create /nodes/proxmox/vzdump
        --storage {{ backup_storage }}
        --mode {{ backup_mode }}
        --compress zstd
        --remove 0
        --vmid {{ item }}
      loop: "{{ backup_targets.split(' ') }}"
      register: backup_jobs
      async: 3600
      poll: 10
      changed_when: false

    - name: Résultat final de la sauvegarde
      debug:
        msg: "Sauvegarde de {{ item.item }} terminée avec le statut : {{ item.rc }}"
      loop: "{{ backup_jobs.results }}"
