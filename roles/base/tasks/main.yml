---
- name: Install base packages
  apt:
    name:
      - git
      - curl
      - zsh
      - htop
    state: present
    update_cache: yes

- name: Configure log rotation
  copy:
    dest: /etc/logrotate.d/ansible-managed
    content: |
      /var/log/*.log {
          weekly
          rotate 4
          compress
          missingok
          notifempty
      }
